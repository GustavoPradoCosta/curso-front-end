<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- 1 flex -->
    <div class="flex">
      <p>Meu</p>
      <p>Primeiro</p>
      <p>Elemento</p>
      <p>Flex</p>
    </div>

    <!-- 2 column-->
    <div class="flex-column">
      <span>Column 1</span>
      <span>Column 2</span>
      <span>Column 3</span>
      <p>Column 4</p>
    </div>

    <!-- 3 wrap -->
    <h2>Wrap</h2>
    <div class="wrap">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>

    <!-- 4 justify-content -->
    <h2>Center</h2>
    <div class="center">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <h2>Space Around</h2>
    <div class="space-around">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <h2>Space Between</h2>
    <div class="space-between">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <h2>End</h2>
    <div class="end">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>

    <!-- 5 align-items -->
    <h2>Align Center</h2>
    <div class="align-center">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <h2>Flex End</h2>
    <div class="flex-end">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <h2>Stretch</h2>
    <div class="stretch">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>

    <!-- gap -->
    <div class="gap">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>

    <!-- order -->
    <h2>Order</h2>
    <div class="order">
      <div class="box" id="three">3</div>
      <div class="box" id="one">1</div>
      <div class="box" id="two">2</div>
    </div>

    <!-- grow -->
    <h2>Grow</h2>
    <div class="grow">
      <div class="box" id="grow-one">1</div>
      <div class="box big" id="grow-two">2</div>
      <div class="box" id="grow-three">3</div>
    </div>

    <!-- basis -->
    <h2>Basis</h2>
    <div class="basis">
      <div class="box" id="basis-one">1</div>
      <div class="box big" id="basis-two">2</div>
      <div class="box" id="basis-three">3</div>
    </div>

    <!-- shrink -->
    <h2>Shrink</h2>
    <div class="shrink">
      <div class="box" id="shrink-one">1</div>
      <div class="box small" id="shrink-two">2</div>
      <div class="box" id="shrink-three">3</div>
    </div>

    <!-- flex shorthand-->
    <h2>Shorthand</h2>
    <div class="shorthand">
      <div class="box">1</div>
      <div class="box different">2</div>
      <div class="box">3</div>
    </div>

    <!-- auto alinhamento-->
    <h2>Auto Alignment</h2>
    <div class="auto-alignment">
      <div class="box"></div>
      <div class="box different"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
