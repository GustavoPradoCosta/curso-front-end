<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeBreak Game</title>
    <link rel="stylesheet" href="css/game.css" />
  </head>
  <body>
    <div class="container">
      <h1>CodeBreak - O Jogo de Lógica</h1>

        id="numberSelector"
        placeholder="Digite seu palpite"
      />

      <p id="message"></p>
    </div>
    <script src="../js/script.js"></script>
  </body>
</html>
