<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.1" />
    <link rel="stylesheet" href="css/style.css" />
    <title>CodeBreak</title>
  </head>
  <body>
    <div class="container">
      <h1>Bem vindo ao CodeBreak!</h1>
      <p>
        O CodeBreak é um jogo de lógica onde o objetivo é descobrir o número
        secreto. Você tem um número limitado de tentativas para adivinhar o
        número correto. Use as dicas para ajustar suas próximas tentativas e
        vencer o jogo!
      </p>
      <button
        onclick="window.location.href = 'game/game.html'"
        id="startButton"
      >
        Começar o jogo!
      </button>
    </div>
  </body>
</html>
